<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; width: 220px; height: 270px; overflow: hidden; }

  .box {
    background: rgba(0,15,8,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-left: 3px solid #FB3640;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 14px 14px;
    gap: 10px;
  }

  .label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #FB3640;
    align-self: flex-start;
  }

  .qr {
    width: 180px;
    height: 180px;
    background: #fff;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }

  .qr iframe {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 300px;
    height: 300px;
    border: none;
    transform: translate(-50%, -50%) scale(0.6);
    transform-origin: center;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
  }
</style>
</head>
<body>
<div class="box">
  <span class="label">Doe agora</span>
  <div class="qr">
    <iframe src="https://widget.livepix.gg/embed/c0e2f015-d6e4-422b-bd4d-f704a87344e0" scrolling="no"></iframe>
  </div>
  <span class="title">Apoie a live</span>
</div>
</body>
</html>
