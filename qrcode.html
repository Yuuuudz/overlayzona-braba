<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; width: 200px; height: 240px; overflow: hidden; }

  .box {
    background: rgba(0,15,8,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-left: 3px solid #FB3640;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px;
    gap: 10px;
  }

  .label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #FB3640;
    align-self: flex-start;
    flex-shrink: 0;
  }

  .qr-window {
    width: 150px;
    height: 150px;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
    background: #fff;
  }

  /* iframe no tamanho real do widget, só deslocado pra cortar header/footer */
  .qr-window iframe {
    position: absolute;
    width: 150px;
    height: 220px;
    border: none;
    top: -22px;  /* sobe pra esconder "livepix.gg/yuuuudz" */
    left: 0;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="box">
  <span class="label">Doe agora</span>
  <div class="qr-window">
    <iframe src="https://widget.livepix.gg/embed/c0e2f015-d6e4-422b-bd4d-f704a87344e0" scrolling="no"></iframe>
  </div>
  <span class="title">Apoie a live</span>
</div>
</body>
</html>
