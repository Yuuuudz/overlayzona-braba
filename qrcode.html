<style>

    color: #FB3640;
    align-self: flex-start;
    flex-shrink: 0;

    width: 160px;
    height: 160px;
    border-radius: 4px;
    flex-shrink: 0;
    background: #fff;
    padding: 6px;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
    flex-shrink: 0;
  }
</style>
