<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; width: 380px; height: 90px; overflow: hidden; }

  .box {
    background: rgba(0,15,8,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-left: 3px solid #FB3640;
    padding: 14px 20px;
    width: 100%;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: #FB3640;
  }

  .values {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #fff;
    letter-spacing: 1px;
  }
  .values span { color: rgba(255,255,255,0.3); font-size: 16px; margin: 0 4px; }

  .track {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .fill {
    height: 100%;
    width: 0%;
    background: #FB3640;
    border-radius: 2px;
    transition: width 1.2s cubic-bezier(0.22,1,0.36,1);
  }
</style>
</head>
<body>
<div class="box">
  <div class="row">
    <span class="label">Meta da live</span>
    <div class="values">
      <span id="cur">R$ 187,50</span>
      <span>/</span>
      <span id="goal">R$ 500</span>
    </div>
  </div>
  <div class="track"><div class="fill" id="fill"></div></div>
</div>
<script>
  function update(cur,goal){
    const pct=Math.min(100,Math.round(cur/goal*100));
    document.getElementById('cur').textContent='R$ '+cur.toFixed(2).replace('.',',');
    document.getElementById('goal').textContent='R$ '+goal.toFixed(0);
    document.getElementById('fill').style.width=pct+'%';
  }
  window.addEventListener('message',e=>{
    try{
      const d=typeof e.data==='string'?JSON.parse(e.data):e.data;
      if(d?.type==='goal'||d?.event==='goal'){
        update((d.data?.current||0)/100,(d.data?.goal||50000)/100);
      }
    }catch{}
  });
  setTimeout(()=>update(187.50,500),300);
</script>
</body>
</html>
